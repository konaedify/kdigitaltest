<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="stylesheet" href="_ds/digital-edify-design-system-e66b7711-7eb9-41ed-a0b9-cbe63bf2e937/colors_and_type.css">
</helmet>
<footer style="position:relative; background:var(--ink); color:#fff; overflow:hidden;">
  <div style="position:absolute; top:-120px; right:-80px; width:520px; height:520px; border-radius:50%; background:var(--grad); filter:blur(140px); opacity:.30; pointer-events:none;"></div>
  <div style="position:relative; max-width:1160px; margin:0 auto; padding:80px 32px 36px;">
    <div style="display:grid; grid-template-columns:1.6fr 1fr 1fr 1fr; gap:48px; padding-bottom:56px; border-bottom:1px solid rgba(255,255,255,.10);">
      <div>
        <div style="display:flex; align-items:center; gap:11px; margin-bottom:18px;">
          <img src="uploads/logo.webp" alt="KDigital" style="height:30px; width:auto; display:block; filter:brightness(0) invert(1);">
        </div>
        <p style="color:rgba(255,255,255,.62); font-size:14px; line-height:1.65; max-width:320px; margin:0 0 22px;">Custom AI applications that modernize how mid-market businesses sell, learn, and operate — built, deployed, and run for you.</p>
        <div style="display:flex; gap:10px;">
          <sc-for list="{{ socials }}" as="s" hint-placeholder-count="3">
            <a href="#" style="width:38px; height:38px; border-radius:10px; border:1px solid rgba(255,255,255,.14); display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.7); transition:all .15s var(--ease);" style-hover="background:rgba(255,255,255,.08); color:#fff;">{{ s.svgEl }}</a>
          </sc-for>
        </div>
      </div>
      <sc-for list="{{ cols }}" as="col" hint-placeholder-count="3">
        <div>
          <div class="mono" style="font-size:10.5px; color:rgba(255,255,255,.45); margin-bottom:18px; letter-spacing:.14em;">{{ col.title }}</div>
          <div style="display:flex; flex-direction:column; gap:12px;">
            <sc-for list="{{ col.items }}" as="it" hint-placeholder-count="4">
              <a href="{{ it.href }}" style="color:rgba(255,255,255,.72); font-size:13.5px; font-family:var(--font-ui); text-decoration:none; transition:color .15s var(--ease);" style-hover="color:#fff;">{{ it.label }}</a>
            </sc-for>
          </div>
        </div>
      </sc-for>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding-top:28px; flex-wrap:wrap; gap:16px;">
      <div class="mono" style="font-size:11px; color:rgba(255,255,255,.4); letter-spacing:.08em;">© 2026 KDIGITAL TECHNOLOGIES · HYDERABAD · BENGALURU · ATLANTA</div>
      <div style="display:flex; gap:22px;">
        <a href="Privacy.dc.html" style="color:rgba(255,255,255,.5); font-size:12.5px; text-decoration:none;" style-hover="color:#fff;">Privacy</a>
        <a href="Terms.dc.html" style="color:rgba(255,255,255,.5); font-size:12.5px; text-decoration:none;" style-hover="color:#fff;">Terms</a>
        <a href="Security.dc.html" style="color:rgba(255,255,255,.5); font-size:12.5px; text-decoration:none;" style-hover="color:#fff;">Security</a>
      </div>
    </div>
  </div>
</footer>
</x-dc>

</body>
</html>
